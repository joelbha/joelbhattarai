name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate PDF from multiple URLs
        uses: chaitanyapotti/url-to-pdf-action@v1.1.0
        with:
          # List all your pages here separated by a comma
          url: https://joelbha.github.io/index.html, https://joelbha.github.io/projects.html, https://joelbha.github.io/documents.html, https://joelbha.github.io/contact.html
          outputName: portfolio.pdf

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.pdf
          git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
          git push
