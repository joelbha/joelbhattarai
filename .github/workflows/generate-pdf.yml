name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate PDF via Docker
        run: |
          # We run a standard tool that doesn't require a separate 'uses' step
          docker run --rm -v $PWD:/slides astefanutti/decktape generic \
          --screenshots --screenshot-directory-name=screenshots \
          https://joelbhattarai.com/index.html portfolio.pdf

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.pdf
          git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
          git push
