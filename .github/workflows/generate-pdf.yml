name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # This gives your custom domain plenty of time to "wake up"
      - name: Wait for DNS
        run: sleep 60

      - name: Generate PDF
        uses: fershad/web-to-pdf-action@v1
        with:
          # Use the URLs that YOU confirmed work in your browser
          url: "https://joelbhattarai.com/index.html"
          output: "portfolio.pdf"

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.pdf
          git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
          git push
