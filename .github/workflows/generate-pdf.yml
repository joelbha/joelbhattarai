name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate PDF
        run: |
          # This command is direct and creates the PDF in the main folder
          docker run --rm -v $PWD:/slides astefanutti/decktape generic \
          --wait 5000 \
          https://joelbhattarai.com/index.html portfolio.pdf

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # We check if the file exists before adding to prevent errors
          if [ -f portfolio.pdf ]; then
            git add portfolio.pdf
            git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
            git push
          else
            echo "PDF was not generated. Check the Generate PDF step logs."
            exit 1
          fi
