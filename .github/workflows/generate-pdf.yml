name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Pages to be ready
        run: sleep 30

      - name: HTML to PDF
        uses: misaelnieto/web_to_pdf_action@master
        with:
          # Using the URLs you confirmed are working
          webPageURL: "https://joelbhattarai.com/index.html https://joelbhattarai.com/projects.html https://joelbhattarai.com/documents.html https://joelbhattarai.com/contact.html"
          outputFile: portfolio.pdf
          usePuppeteer: true
          # This helps prevent the 404/Timeout errors
          pdfOptions: '{"timeout": 60000, "waitUntil": "networkidle0"}'

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.pdf
          git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
          git push
