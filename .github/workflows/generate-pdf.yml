name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: HTML to PDF
        uses: misaelnieto/web_to_pdf_action@master
        with:
          webPageURL: "file://${{ github.workspace }}/index.html file://${{ github.workspace }}/projects.html file://${{ github.workspace }}/documents.html file://${{ github.workspace }}/contact.html"
          outputFile: "portfolio.pdf"
          usePuppeteer: true

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.pdf
          git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
          git push
