name: Generate Portfolio PDF
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Pages to deploy
        run: sleep 60 # Important: ensures the newest version of your site is live before printing

      - name: HTML to PDF
        uses: misaelnieto/web_to_pdf_action@master
        with:
          # Add all your page URLs here, separated by a space
          webPageURL: "https://joelbhattarai.com/index.html https://joelbhattarai.com/projects.html https://joelbhattarai.com/documents.html https://joelbhattarai.com/contact.html"
          outputFile: portfolio.pdf
          usePuppeteer: true

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portfolio.pdf
          git commit -m "Auto-update portfolio PDF" || echo "No changes to commit"
          git push
