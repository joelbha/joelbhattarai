name: Generate Portfolio PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install puppeteer serve

      - name: Generate PDF
        run: node generate-portfolio.js

      - name: Commit and push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Joel_Bhattarai_Portfolio.pdf
          git diff --cached --quiet || git commit -m "Update portfolio PDF"
          git push
