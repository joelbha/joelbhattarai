name: Generate Portfolio PDF

on:
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install puppeteer serve

      - name: Generate PDF
        run: node generate-portfolio.js

      - name: Upload PDF
        uses: actions/upload-artifact@v5
        with:
          name: Joel_Bhattarai_Portfolio
          path: Joel_Bhattarai_Portfolio.pdf
